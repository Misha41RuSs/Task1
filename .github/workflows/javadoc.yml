name: Generate and Publish Javadoc

on:
  push:
    branches:
      - main

# Даем права для деплоя через новый механизм GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Запрещаем параллельные деплои, чтобы не было ошибки "in progress deployment"
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven and Generate Javadoc
        run: mvn clean javadoc:javadoc -B

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './target/site/apidocs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
